<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Timetable Tracker</title>
    <style>
    body { 
        font-family: Arial; text-align: center; margin-top: 50px; 
    }.period { 
        font-size: 24px; margin: 10px; 
    }
    </style>
    <link rel = "icon" href = "assets/ichika.png" type = "image/png" />
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <h1>Current Period</h1>
    <div id="current-period" class="period" aria-live="polite">Loading</div>

    <!-- added: next period display and dark-mode toggle -->
    <h2>Next Period</h2>
    <div id="next-period" class="period" aria-live="polite">Loading</div>

    <button id="theme-toggle" onclick="myFunction()" aria-pressed="false">Toggle Dark Mode</button>

    <script src="javascript.js"></script>

    <img src="assets/timetable.png" alt="Full Timetable" />
</body>
</html>
